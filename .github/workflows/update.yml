name: Actualizar catálogo

on:
  schedule:
    - cron: "*/5 * * * *"     # cada 5 minutos
  workflow_dispatch:           # botón para correrlo a mano
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: actualizar-catalogo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Construir catálogo
        env:
          STORE_SLUG: ${{ secrets.STORE_SLUG }}
          MARKUP: ${{ secrets.MARKUP }}
          CATEGORY: ${{ secrets.CATEGORY }}
        run: python build_catalog.py

      - name: Publicar cambios
        run: |
          git config user.name  "catalogo-bot"
          git config user.email "actions@github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Sin cambios en el catálogo."
          else
            git commit -m "Actualiza catálogo ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
