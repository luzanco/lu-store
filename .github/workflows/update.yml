name: Actualizar catálogo

on:
  schedule:
    - cron: "*/5 * * * *"     # cada 5 minutos (respaldo; GitHub lo retrasa)
  repository_dispatch:         # "despertador" externo (cron-job.org) cada 5 min exactos
    types: [tick]
  workflow_dispatch:           # botón para correrlo a mano
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: actualizar-catalogo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Construir catálogo
        env:
          STORE_SLUG: ${{ secrets.STORE_SLUG }}
          MARKUP: ${{ secrets.MARKUP }}
          CATEGORY: ${{ secrets.CATEGORY }}
          WHATSAPP: ${{ secrets.WHATSAPP }}
        run: python build_catalog.py

      - name: Generar posts para redes
        run: python make_posts.py

      - name: Publicar cambios
        run: |
          git config user.name  "catalogo-bot"
          git config user.email "actions@github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Sin cambios en el catálogo."
            exit 0
          fi
          git commit -m "Actualiza catálogo ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Reintentar por si otra corrida publicó al mismo tiempo (nuestra versión, más fresca, gana)
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Publicado."; exit 0
            fi
            echo "Choque con otra corrida; reintentando ($i)..."
            git fetch origin main
            git rebase -X ours origin/main || git rebase --abort
            sleep 3
          done
          echo "No se pudo publicar tras varios intentos" >&2
          exit 1
